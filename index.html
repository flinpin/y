<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
        }
        canvas {
            border: 1px solid #fff;
        }
    </style>
</head>
<body>
    <canvas id="tetris" width="240" height="400"></canvas>
    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');

        // Define game variables and shapes
        const ROWS = 20;
        const COLS = 10;
        const BLOCK_SIZE = 20;
        const colors = ['#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

        let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        let currentPiece; // Placeholder for the current piece

        // Function to draw the game board
        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c] !== 0) {
                        context.fillStyle = colors[board[r][c] - 1];
                        context.fillRect(c * BLOCK_SIZE, r * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }
        }

        // Start the game
        function startGame() {
            // Logic to initialize and start the game
            draw();
        }

        window.onload = startGame;
    </script>
</body>
</html>
