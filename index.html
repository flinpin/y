<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #282c34;
            color: white;
            font-family: Arial, sans-serif;
        }
        #game {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
            gap: 1px;
        }
        .piece {
            width: 30px;
            height: 30px;
            background-color: #61dafb;
        }
        .control {
            margin-top: 20px;
        }
        .instructions {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="instructions">
        Controls:
        <ul>
            <li>Arrow Left: Move Left</li>
            <li>Arrow Right: Move Right</li>
            <li>Arrow Down: Drop Faster</li>
            <li>Space: Rotate</li>
        </ul>
    </div>
    <div id="game"></div>
    <script>
        const gameArea = document.getElementById('game');
        let currentPiece;

        function createPiece() {
            // Logic to create a new Tetris piece
            currentPiece = document.createElement('div');
            currentPiece.className = 'piece';
            gameArea.appendChild(currentPiece);
        }

        function dropPiece() {
            // Logic to drop the piece
            // Implement faster drop on Arrow Down
            currentPiece.style.gridRowStart = (parseInt(currentPiece.style.gridRowStart) || 1) + 1;
        }

        document.addEventListener('keydown', (event) => {
            switch(event.key) {
                case 'ArrowLeft':
                    // Move left
                    break;
                case 'ArrowRight':
                    // Move right
                    break;
                case 'ArrowDown':
                    dropPiece(); // Drop faster
                    break;
                case ' ': // Space key
                    // Rotate piece
                    break;
            }
        });

        createPiece(); // Start the game
    </script>
</body>
</html>
