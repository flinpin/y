<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #000; }
        canvas { border: 2px solid #fff; }
        h1 { color: #fff; text-align: center; }
    </style>
</head>
<body>
    <div>
        <h1>Tetris</h1>
        <canvas id="gameCanvas" width="240" height="400"></canvas>
        <br>
        <div>Score: <span id="score">0</span></div>
        <div>Next Piece: <span id="nextPiece"></span></div>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const context = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const nextPieceDisplay = document.getElementById('nextPiece');

        // Game settings
        const ROWS = 20;
        const COLS = 10;
        const BLOCK_SIZE = 20;
        let score = 0;
        let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        let currentPiece, nextPiece;
        let isPaused = false;

        // Tetromino shapes
        const TETROMINOS = [
            [[1, 1, 1, 1]], // I
            [[1, 1], [1, 1]], // O
            [[0, 1, 0], [1, 1, 1]], // T
            [[1, 1, 0], [0, 1, 1]], // S
            [[0, 1, 1], [1, 1, 0]], // Z
            [[1, 0, 0], [1, 1, 1]], // L
            [[0, 0, 1], [1, 1, 1]]  // J
        ];

        // Functions for game logic...
        function drawBlock(x, y) {
            context.fillStyle = '#fff';
            context.fillRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
            context.strokeStyle = '#000';
            context.strokeRect(x * BLOCK_SIZE, y * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
        }

        function drawBoard() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            board.forEach((row, rowIndex) => {
                row.forEach((value, colIndex) => {
                    if (value) drawBlock(colIndex, rowIndex);
                });
            });
        }

        function drawPiece() {
            currentPiece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) drawBlock(currentPiece.x + x, currentPiece.y + y);
                });
            });
        }

        function mergePiece() {
            currentPiece.shape.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value) board[currentPiece.y + y][currentPiece.x + x] = value;
                });
            });
        }

        function clearLines() {
            board = board.filter(row => row.some(value => value === 0));
            const linesCleared = ROWS - board.length;
            score += linesCleared;
            scoreDisplay.innerText = score;
            while (board.length < ROWS) {
                board.unshift(Array(COLS).fill(0));
            }
        }

        function gameOver() {
            if (board[0].some(value => value)) {
                alert('Game Over! Your score: ' + score);
                resetGame();
            }
        }

        function resetGame() {
            board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            score = 0;
            scoreDisplay.innerText = 0;
            nextPiece = randomPiece();
            currentPiece = nextPiece;
            nextPiece = randomPiece();
        }

        function randomPiece() {
            const index = Math.floor(Math.random() * TETROMINOS.length);
            return { shape: TETROMINOS[index], x: COLS / 2 - 1, y: 0 };
        }

        function dropPiece() {
            if (!isPaused) {
                currentPiece.y++;
                if (collision()) {
                    currentPiece.y--;
                    mergePiece();
                    clearLines();
                    gameOver();
                    currentPiece = nextPiece;
                    nextPiece = randomPiece();
                }
                drawBoard();
                drawPiece();
            }
        }

        function collision() {
            return currentPiece.shape.some((row, y) => {
                return row.some((value, x) => {
                    if (value) {
                        const newX = currentPiece.x + x;
                        const newY = currentPiece.y + y;
                        return (newX < 0 || newX >= COLS || newY >= ROWS || (newY >= 0 && board[newY][newX]));
                    }
                    return false;
                });
            });
        }

        function rotatePiece() {
            const originalShape = currentPiece.shape;
            currentPiece.shape = originalShape[0].map((val, index) =>
                originalShape.map(row => row[index]).reverse()
            );
            if (collision()) {
                currentPiece.shape = originalShape;
            }
        }

        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowLeft':
                    currentPiece.x--;
                    if (collision()) currentPiece.x++;
                    break;
                case 'ArrowRight':
                    currentPiece.x++;
                    if (collision()) currentPiece.x--;
                    break;
                case ' ': // Space to rotate
                    rotatePiece();
                    break;
                case 'p': // Pause
                    isPaused = !isPaused;
                    break;
            }
            drawBoard();
            drawPiece();
        });

        resetGame();
        setInterval(dropPiece, 1000);
    </script>
</body>
</html>
